[Time.units]
"second (s)"    = 1.0
"minute (min)"  = 60.0
"hour (hr)"     = 3600.0
"day (d)"       = 86400.0
"week (wk)"     = 604800.0                  # exact: 7 × 86400 s
"Julian year (a)" = 31557600.0              # exact: 365.25 × 86400 s (IAU definition)

# ---------------------------------------------------------------------------
# Energy — base unit: joule (J)
# ---------------------------------------------------------------------------
[Energy]
base_unit = "joule (J)"

[Energy.units]
"joule (J)"               = 1.0
"calorie (cal)"           = 4.184            # exact: 1 thermochemical cal = 4.184 J (NIST SP 811)
"electronvolt (eV)"       = 1.602176634e-19  # exact: e × 1 V; NIST CODATA 2018 / SI 2019
"watt-hour (Wh)"          = 3600.0           # exact: 1 Wh = 3600 J
"BTU (IT)"                = 1055.05585262    # NIST SP 811: 1 BTU_IT = 1055.055 852 62 J
"foot-pound force (ft·lbf)" = 1.3558179483314004  # NIST SP 811: 1 ft·lbf = 0.3048 × 4.4482216 J
"therm (EC)"              = 1.05505585262e8  # exact: 1 therm = 100 000 BTU_IT
"ton of TNT (tTNT)"       = 4.184e9          # NIST SP 811: 1 ton TNT = 10⁹ cal = 4.184 × 10⁹ J

# ---------------------------------------------------------------------------
# Power — base unit: watt (W)
# ---------------------------------------------------------------------------
[Power]
base_unit = "watt (W)"

[Power.units]
"watt (W)"        = 1.0
"kgm/s"           = 9.80665               # 1 kgf·m/s = g_n × 1 W; g_n = 9.806 65 m/s² (exact, BIPM)
"cal/h"           = 1.1622222222222222e-3  # 1 cal_th/h = 4.184/3600 W (NIST SP 811 Table B.9 cal_th)
"erg/s"           = 1e-7                  # exact: 1 erg/s = 10⁻⁷ W
"HP"              = 745.6998715822702     # mechanical horsepower: 550 ft·lbf/s = 550 × 0.3048 × 4.4482216152605 W (NIST SP 811)
"CV"              = 735.49875             # metric horsepower (PS/CV): 75 kgf·m/s = 75 × 9.80665 W (exact)
"BTU/h"           = 0.29307107017222     # 1 BTU_IT/h = 1055.055 852 62 / 3600 W (NIST SP 811)

# ---------------------------------------------------------------------------
# Pressure — base unit: Pascal (Pa)
# ---------------------------------------------------------------------------
[Pressure]
base_unit = "Pascal (Pa)"

[Pressure.units]
"Pascal (Pa)"              = 1.0
"bar (b)"                  = 100000.0         # exact: 1 bar = 10⁵ Pa
"atmosphere (atm)"         = 101325.0         # exact: 1 atm = 101 325 Pa (BIPM)
"mm Hg"                    = 133.322387415    # NIST SP 811: 1 mmHg = 133.322 387 415 Pa
"Torr (Torr)"              = 133.32236842105263  # exact: 1 Torr = 101325/760 Pa (differs slightly from mmHg conventional)
"pound per sq. inch (psi)" = 6894.757293168   # NIST SP 811: 1 psi = 6894.757 293 168 Pa
"inch Hg (inHg)"           = 3386.388640341   # NIST SP 811: 1 inHg = 3386.388 640 341 Pa
"technical atmosphere (at)"= 98066.5          # exact: 1 at = 1 kgf/cm² = 9.806 65 × 10⁴ Pa (BIPM)

# ---------------------------------------------------------------------------
# Data — base unit: bit (b)
# Note: order-of-magnitude scaling for Data uses base 1024 (IEC prefixes),
# not base 10 (SI prefixes).  This is handled by the converter; the factors
# here are the *unit* conversion factors only (bit <-> byte).
# ---------------------------------------------------------------------------
[Data]
base_unit = "bit (b)"

[Data.units]
"bit (b)"  = 1.0
"byte (B)" = 8.0

# ---------------------------------------------------------------------------
# Temperature (UC-I04) — affine/offset magnitude
# ---------------------------------------------------------------------------
# Base unit: kelvin (K), factor=1, offset=0.
# Convention: [factor, offset] means T_kelvin = T_unit * factor + offset.
#
# Derived from:
#   °C: T_K = T_C + 273.15           → factor=1,      offset=273.15
#   °F: T_K = (T_F - 32)*(5/9)+273.15 = T_F*(5/9)+255.3722...
#             → factor=5/9≈0.5556,   offset=255.37222...
#   °R: T_K = T_R*(5/9)              → factor=5/9,    offset=0
#
# The optional [Temperature.offsets] table stores the per-unit additive offset
# (the base-unit value at 0 of this unit).  Units without an offsets entry are
# treated as pure multiplicative (offset=0).
#
# Temperature INCREMENTS (ΔT) do not use offsets — add a separate magnitude
# "Temperature_delta" that uses scale-only factors if needed.

[Temperature]
base_unit = "kelvin (K)"

[Temperature.units]
"kelvin (K)"     = 1.0
"celsius (°C)"   = 1.0
"fahrenheit (°F)" = 0.5555555555555556
"rankine (°R)"   = 0.5555555555555556

[Temperature.offsets]
# offsets: value in Kelvin corresponding to 0 in each unit
"kelvin (K)"     = 0.0
"celsius (°C)"   = 273.15
"fahrenheit (°F)" = 255.37222222222223
"rankine (°R)"   = 0.0

# Temperature increments (ΔT, scale-only — no offset applied)
[Temperature_delta]
base_unit = "kelvin (K)"

[Temperature_delta.units]
"kelvin (K)"     = 1.0
"celsius (°C)"   = 1.0
"fahrenheit (°F)" = 0.5555555555555556
"rankine (°R)"   = 0.5555555555555556

