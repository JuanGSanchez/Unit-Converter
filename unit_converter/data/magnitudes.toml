"litre (l)"               = 0.001             # exact: 1 L = 10⁻³ m³
"cubic inch (in³)"        = 1.6387064e-5      # exact: (0.0254)³ (NIST SP 811)
"cubic foot (ft³)"        = 0.028316846592    # exact: (0.3048)³
"US gallon (gal)"         = 3.785411784e-3    # exact: 1 US gal = 231 in³ (NIST SP 811)
"Imp. gallon (gal Imp.)"  = 4.54609e-3        # exact: 1 Imp. gal = 4.546 09 L (UK definition 1985)
"US quart (qt)"           = 9.46352946e-4     # exact: 1 US qt = ¼ US gal
"Imp. quart (qt Imp.)"    = 1.1365225e-3      # exact: ¼ Imp. gal
"US fluid ounce (fl oz)"  = 2.95735295625e-5  # exact: 1 US fl oz = 1/128 US gal (NIST SP 811)
"Imp. pint (pt Imp.)"     = 5.68261e-4        # exact: ⅛ Imp. gal; NIST SP 811
"US pint (pt)"            = 4.73176473e-4     # exact: ½ US qt
"US cup (cup)"            = 2.365882365e-4    # exact: ½ US pint (NIST)
"US tablespoon (tbsp)"    = 1.47867647813e-5  # exact: 1 tbsp = ½ fl oz
"US teaspoon (tsp)"       = 4.92892159375e-6  # exact: ⅓ tbsp = 1/6 fl oz
"oil barrel (bbl)"        = 0.158987294928    # exact: 1 bbl = 42 US gal (NIST SP 811)

# ---------------------------------------------------------------------------
# Time — base unit: second (s)
# ---------------------------------------------------------------------------
[Time]
