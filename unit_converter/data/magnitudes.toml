# magnitudes.toml — Unit-Converter magnitude database
#
# Schema (one TOML table per magnitude):
#
#   [MagnitudeName]
#   base_unit = "<unit name>"          # informational; the first entry in units is the base
#   [MagnitudeName.units]
#   "<unit name>" = <conversion_factor_float>
#
# Rules:
#   - The first unit listed is the base unit (factor 1.0 by convention for the
#     default database; the loader does not enforce this for custom databases).
#   - Conversion factors must be positive, non-zero finite floats.
#   - All factors are relative to the base unit:
#       result = (value * from_factor) / to_factor
#     (prefix / order-of-magnitude scaling is handled separately by the converter).
#   - To add a new magnitude, add a new [MagnitudeName] table following the schema.
#   - Unit names may include Unicode superscripts (e.g. "m²") — no special escaping needed.
#
# Read by: unit_converter.core.data_loader._load_toml  (Python tomllib, stdlib >=3.11)
#
# Sources / authorities cited inline for non-obvious factors:
#   NIST SP 811 (2008 ed.)  — https://www.nist.gov/pml/special-publication-811
#   BIPM SI Brochure 9th ed. — https://www.bipm.org/en/publications/si-brochure
#   IAU 2012 nominal values  — https://www.iau.org/static/resolutions/IAU2012_English.pdf
#   NIST CODATA 2018         — https://physics.nist.gov/cuu/Constants/
#
# Legacy-to-canonical unit name mapping (UC-B09)
# ----------------------------------------------
# The original Magnitudes.txt used different spellings for some units.
# The TOML names below are canonical; use these when calling the API or GUI:
#
#   Legacy name            -> Canonical name (this file)
#   "jule (J)"             -> "joule (J)"        (Energy)
#   "electronvolt (Ev)"    -> "electronvolt (eV)" (Energy)
#
# If you load the legacy Magnitudes.txt file directly, unit names may differ.
# The TOML loader (this file) is the source of truth for all supported names.

# ---------------------------------------------------------------------------
# Mass — base unit: gram (g)
# ---------------------------------------------------------------------------
[Mass]
base_unit = "gram (g)"

[Mass.units]
"gram (g)"            = 1.0
"Av. pound (lb)"      = 453.59237          # NIST SP 811 Table B.8: 1 lb = 453.592 37 g (exact)
"Av. ounce (oz)"      = 28.349523125       # NIST SP 811: 1 oz = 28.349 523 125 g (exact, 1 lb / 16)
"tonne (t)"           = 1.0e6              # 1 t = 1000 kg = 1 000 000 g (SI definition)
"stone (st)"          = 6350.29318         # NIST SP 811: 1 stone = 14 lb = 14 × 453.592 37 g
"grain (gr)"          = 0.06479891         # NIST SP 811: 1 grain = 64.798 91 mg (exact)
"carat (ct)"          = 0.2                # 1 metric carat = 200 mg (exact, BIPM)
"slug"                = 14593.90294        # NIST SP 811: 1 slug = 14.593 902 94 kg (= 1 lbf·s²/ft)
"unified atomic mass unit (u)" = 1.66053906660e-24  # NIST CODATA 2018: 1 u = 1.660 539 066 60 × 10⁻²⁴ g

# ---------------------------------------------------------------------------
# Length — base unit: meter (m)
# ---------------------------------------------------------------------------
[Length]
base_unit = "meter (m)"

[Length.units]
"meter (m)"              = 1.0
"inch (in)"              = 0.0254           # exact by definition (NIST SP 811)
"foot (ft)"              = 0.3048           # exact: 1 ft = 0.3048 m (NIST SP 811)
"yard (yd)"              = 0.9144           # exact: 1 yd = 0.9144 m (NIST SP 811)
"mile (mi)"              = 1609.344         # exact: 1 mi = 1609.344 m (NIST SP 811 Table B.8)
"nautical mile (nmi)"    = 1852.0           # exact: 1 nmi = 1852 m (BIPM / IHO)
"ångström (Å)"           = 1.0e-10          # 1 Å = 10⁻¹⁰ m (NIST SP 811)
"astronomical unit (au)" = 1.495978707e11   # IAU 2012: 1 au = 149 597 870 700 m (exact)
"light-year (ly)"        = 9.4607304725808e15  # IAU: 1 ly = 9.460 730 472 5808 × 10¹⁵ m
"parsec (pc)"            = 3.085677581491367e16  # IAU: 1 pc = (648000/π) au ≈ 3.0857 × 10¹⁶ m

# ---------------------------------------------------------------------------
# Area — base unit: square meter (m²)
# ---------------------------------------------------------------------------
[Area]
base_unit = "square meter (m²)"

[Area.units]
"square meter (m²)"  = 1.0
"square inch (in²)"  = 6.4516e-4           # exact: (0.0254)² (NIST SP 811)
"square foot (ft²)"  = 0.09290304          # exact: (0.3048)²
"square yard (yd²)"  = 0.83612736          # exact: (0.9144)²; corrected from 0.836127
"square mile (mi²)"  = 2589988.110336      # exact: (1609.344)²; corrected from 2590000.0 (NIST SP 811)
"acre"               = 4046.8564224        # exact: 1 acre = 4840 yd² = 4046.856 422 4 m² (NIST SP 811)
"hectare (ha)"       = 10000.0             # exact: 1 ha = 10⁴ m²
"are (a)"            = 100.0               # exact: 1 a = 100 m² (SI)

# ---------------------------------------------------------------------------
# Volume — base unit: cubic meter (m³)
# ---------------------------------------------------------------------------
[Volume]
