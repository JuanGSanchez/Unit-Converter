# .github/workflows/ci.yml
# ---------------------------------------------------------------------------
# Continuous Integration for Unit-Converter
#
# WHAT THIS WORKFLOW DEMONSTRATES (GitHub Actions core concepts):
#   - Triggers (`on:`)        when the workflow runs (push / pull_request)
#   - Jobs & steps            a job runs on a fresh runner; steps run in order
#   - Marketplace actions     reusable steps via `uses:` (checkout, setup-python)
#   - Build matrix            run the same job across several Python versions
#   - Dependency caching      `cache: pip` reuses the wheel cache across runs
#   - Artifacts               upload files (the coverage report) for download
#   - Required status checks  this job's green tick can be made to gate merges
# ---------------------------------------------------------------------------
name: CI

# WHEN it runs: every push to main, and every pull request targeting main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege: CI only needs to read the repository contents.
permissions:
  contents: read

# If you push again while a run is still going for the same branch/PR, cancel
# the older run -- faster feedback, fewer wasted minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest            # GitHub-hosted Linux runner

    # Run this whole job once per Python version. fail-fast:false means a
    # failure on one version does NOT cancel the others -- you see every result.
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    env:
      # PySide6 has no display on a CI runner. The "offscreen" Qt platform
      # plugin lets Qt initialise headlessly so GUI-touching imports succeed.
      QT_QPA_PLATFORM: offscreen

    steps:
      # 1) Check the repository out onto the runner.
      - name: Check out code
        uses: actions/checkout@v4

      # 2) Install the requested Python and turn on pip caching.
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # 3) System libraries Qt dlopens on Linux even in offscreen mode.
      - name: Install Qt runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3 libglib2.0-0

      # 4) Install the project (editable) with dev + GUI + access-layer extras.
      #    Unit-Converter keeps PySide6 in the [gui] extra (its core has no deps).
      - name: Install project
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,gui,api]"

      # 5) Run the suite. The 90% line-coverage gate is in pyproject.toml
      #    (--cov-fail-under=90); we pass --cov explicitly to activate pytest-cov
      #    and add reports so the artifact below is useful.
      - name: Run tests + coverage gate
        run: pytest --cov=unit_converter --cov-report=xml --cov-report=term-missing

      # 6) Save the coverage report as a downloadable artifact. `if: always()`
      #    uploads it even when the tests fail, which helps debugging.
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-py${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: ignore
